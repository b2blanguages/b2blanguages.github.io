<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Nível — B2B Languages</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%238c3124'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>B2B</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;500;600;700&family=Titillium+Web:wght@200;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#8c3124;--red-light:#a63b2d;--gray:#666;--gray-dark:#363636;--font-body:'Titillium Web',sans-serif;--font-head:'Dosis',sans-serif}
body{font-family:var(--font-body);background:#f9f9f9;color:var(--gray-dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.test-container{background:#fff;border-radius:16px;padding:48px 40px;max-width:600px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
.test-container img{height:60px;border-radius:10px;margin-bottom:24px}
.test-container h1{font-family:var(--font-head);font-size:2rem;margin-bottom:8px;color:var(--gray-dark)}
.test-container p{color:var(--gray);margin-bottom:32px;font-size:1rem;line-height:1.6}
.placeholder-box{background:#f0f0f0;border:2px dashed #ccc;border-radius:12px;padding:60px 24px;color:var(--gray);font-size:1rem}
.back-link{margin-top:24px;display:inline-block;color:var(--red);font-weight:600;text-decoration:none;transition:0.3s}
.back-link:hover{color:var(--red-light)}
</style>
</head>
<body>
<div class="test-container">
<img src="logo.jpg" alt="B2B Languages">
<h1>Teste de Nível</h1>
<p>Avalie seu nível de inglês ou espanhol e receba um plano personalizado.</p>
<div class="placeholder-box">
<i class="fas fa-clipboard-check" style="font-size:2rem;margin-bottom:16px;color:var(--red)"></i>
<p><strong>[Teste de nível será implementado aqui]</strong></p>
<p style="font-size:0.9rem;margin-top:8px">Perguntas de múltipla escolha para avaliar reading, listening, grammar e vocabulary.</p>
</div>
<a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
</div>
</body>
</html>
