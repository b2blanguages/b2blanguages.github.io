<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolha seu idioma — B2B Languages</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%238c3124'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>B2B</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;500;600;700&family=Titillium+Web:wght@200;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#8c3124;--red-light:#a63b2d;--gray:#666;--gray-dark:#363636;--gray-light:#999;--white:#ffffff;--bg:#f9f9f9;--bg-card:#ffffff;--font-body:'Titillium Web',sans-serif;--font-head:'Dosis',sans-serif;--shadow:0 4px 20px rgba(0,0,0,0.08);--shadow-hover:0 8px 30px rgba(140,49,36,0.15);--transition:all 0.3s ease;--border-radius:12px}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--gray-dark);line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{background:var(--bg-card);border-radius:20px;padding:48px 40px;max-width:600px;width:100%;box-shadow:var(--shadow);text-align:center}
.logo{height:80px;border-radius:10px;margin-bottom:24px}
h1{font-family:var(--font-head);font-size:2rem;margin-bottom:8px;color:var(--gray-dark)}
p.subtitle{color:var(--gray);font-size:1.1rem;margin-bottom:32px}
.language-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.language-card{background:#ffffff;border:3px solid #e0e0e0;border-radius:16px;padding:32px 24px;text-align:center;cursor:pointer;text-decoration:none;display:block;transition:all 0.3s}
.language-card:hover{border-color:var(--red);transform:translateY(-4px);box-shadow:var(--shadow-hover)}
.language-card.english{border-color:var(--red)}
.flag{font-size:4rem;margin-bottom:16px;display:block}
.language-name{font-family:var(--font-head);font-size:1.3rem;font-weight:700;color:#333333;margin-bottom:4px}
.language-desc{color:#555555;font-size:0.95rem}
.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--gray);text-decoration:none;margin-top:24px;transition:var(--transition)}
.back-link:hover{color:var(--red)}
@media(max-width:600px){.container{padding:32px 24px}.language-grid{grid-template-columns:1fr}h1{font-size:1.6rem}}
</style>
</head>
<body>
<div class="container">
<img src="../logo.jpg" alt="B2B Languages" class="logo">
<h1>Escolha seu idioma</h1>
<p class="subtitle">Elija su idioma de interés / Choose your language</p>

<div class="language-grid">
<a href="english/" class="language-card english">
<span class="flag">🇺🇸</span>
<div class="language-name">English / Inglês</div>
<div class="language-desc">Fazer teste de inglês</div>
</a>
<a href="espanol/" class="language-card">
<span class="flag">🇪🇸</span>
<div class="language-name">Español / Espanhol</div>
<div class="language-desc">Hacer prueba de español</div>
</a>
</div>

<a href="../" class="back-link">
<i class="fas fa-arrow-left"></i>
Voltar ao site
</a>
</div>
</body>
</html>
